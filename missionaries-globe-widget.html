<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Missionaries Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: transparent; }

    #map-wrap {
      position: relative;
      width: 100%;
      height: 580px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0,0,0,0.12);
    }

    #map { width: 100%; height: 100%; }

    /* Section divider above map */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .section-divider::before,
    .section-divider::after {
      content: ''; flex: 1; height: 1.5px; background: #c8c8c8;
    }
    .section-divider span {
      font-family: Georgia, serif;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #666;
      white-space: nowrap;
    }

    /* Count badge */
    #count-badge {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.94);
      border: 1px solid #e0e0e0;
      border-radius: 24px;
      padding: 8px 20px;
      font-size: 13px;
      color: #555;
      font-family: Georgia, serif;
      letter-spacing: 0.04em;
      z-index: 2;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      box-shadow: 0 2px 16px rgba(240,112,48,0.15), 0 1px 4px rgba(0,0,0,0.08);
    }
    .badge-number {
      font-family: Georgia, serif;
      font-size: 17px;
      font-weight: 600;
      color: #f07030;
      text-shadow: 0 0 12px rgba(240,112,48,0.4);
    }
    .badge-label {
      font-size: 13px;
      color: #333;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .badge-divider {
      color: #ccc;
      margin: 0 4px;
    }
    .badge-cta {
      font-size: 12px;
      color: #888;
      font-style: italic;
    }

    /* Custom pin */
    .missionary-pin {
      width: 18px;
      height: 18px;
      background: #f07030;
      border: 2.5px solid #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(240,112,48,0.5);
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .missionary-pin:hover {
      transform: scale(1.4);
      background: #dc3232;
    }

    /* Mapbox popup overrides */
    .mapboxgl-popup-content {
      border-radius: 14px !important;
      padding: 0 !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important;
      border: 1px solid #e8e8e8 !important;
      width: 230px !important;
      overflow: hidden;
    }
    .mapboxgl-popup-close-button {
      font-size: 18px !important;
      color: #888 !important;
      right: 8px !important;
      top: 6px !important;
      z-index: 1;
    }
    .mapboxgl-popup-tip { display: none !important; }

    .popup-inner { padding: 0; }
    .popup-photo {
      width: 100%;
      height: 130px;
      background: #ececec;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 12px;
      font-style: italic;
      overflow: hidden;
    }
    .popup-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .popup-text { padding: 1rem 1.1rem 1.1rem; }
    .popup-name {
      font-family: Georgia, serif;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }
    .popup-location {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.4rem;
    }
    .popup-ministry {
      font-size: 12.5px;
      color: #555;
      line-height: 1.55;
    }
  </style>
</head>
<body>

  <div class="section-divider"><span>Missionaries</span></div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="count-badge"><span class="badge-number">20+</span> <span class="badge-label">Missionaries Worldwide</span> <span class="badge-divider">·</span> <span class="badge-cta">click a pin to learn more</span></div>
  </div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiMjBkeXcwNSIsImEiOiJjbXBxMGN3aW0wazFoMnFwcWtqYmdhZDVtIn0.7XRZpY687LoOp35dNOSmMw';

    const missionaries = [
      { name: "Greg & Hue Chon White",      ministry: "Medical Outreach",                       location: "Ukraine",              lat: 50.45,  lng: 30.52   },
      { name: "Pink & Selena Davis",         ministry: "Elder, NZ Bible Centre",                 location: "Wellington, New Zealand",    lat: -41.28, lng: 174.78  },
      { name: "David & Ashley Ellingson",   ministry: "Leadership Training, Madagascar 3M",     location: "Madagascar",                 lat: -18.91, lng: 47.54   },
      { name: "Aleksey & Alla Raikhstadt",  ministry: "Pastor, Beit Immanuel",                  location: "Israel",           lat: 32.08,  lng: 34.78   },
      { name: "Arthur & Olga Alard",        ministry: "Dean, IBCM",                             location: "Johannesburg, South Africa", lat: -26.20, lng: 28.04   },
      { name: "Alan & Sandy White",         ministry: "Bible Translation, Rock International",  location: "Idaho, USA",                 lat: 47.66,  lng: -116.79  },
      { name: "Mika & Fabi Kaltoft",        ministry: "Missionary Family, Scandinavia",         location: "Aarhus, Denmark",            lat: 56.16,  lng: 10.20   },
      { name: "Greg & Sonya Vaughn",        ministry: "Pastor, Valley Church of Christ",        location: "Wasilla, Alaska, USA",       lat: 61.58,  lng: -149.44  },
      { name: "Jereme & Lindsay Morris",    ministry: "Shepherd's Training Institute",          location: "Egypt",               lat: 30.04,  lng: 31.24   },
      { name: "Erlend & Henriette Hardang", ministry: "Church Plant Pastor",                    location: "Sandefjord, Norway",         lat: 59.13,  lng: 10.22   },
      { name: "Justin & Rebecca Brown",     ministry: "Pastoral Training, Expositor's Academy", location: "Manila, Philippines",        lat: 14.56,  lng: 121.02  },
      { name: "Ricky & Arely Kroeger",      ministry: "Bible Translation, Wycliffe",            location: "Oaxaca, Mexico",             lat: 17.06,  lng: -96.72   },
      { name: "John & Meg Glass",           ministry: "Church Planting & Pastor",               location: "Geneva, Switzerland",        lat: 46.20,  lng: 6.14    },
      { name: "Matthew & Natasha Smith",    ministry: "Pastor of Missions",                     location: "Kladno, Czech Republic",     lat: 50.14,  lng: 14.10   },
      { name: "Mike & Paola Heissler",      ministry: "Pastor & Translator",                    location: "Oroszlány, Hungary",         lat: 47.49,  lng: 18.31   },
      { name: "Philippe & Sophia Viguier",  ministry: "Church Planting & Pastor",               location: "Lyon, France",               lat: 45.75,  lng: 4.85    },
      { name: "Kim Guess",                  ministry: "Children's Ministry",                    location: "Târgu Mureș, Romania",       lat: 46.54,  lng: 24.56   },
      { name: "Allan & Sandra Luciano",     ministry: "Elder & Pastoral Training, TEA",         location: "Manila, Philippines",        lat: 14.52,  lng: 121.06  },
      { name: "Jimmy & Mireya Mendez",      ministry: "Pastor, SoyTemplo",                      location: "San Salvador, El Salvador",  lat: 13.69,  lng: -89.19   },
    ];

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/light-v11',
      center: [20, 25],
      zoom: 1.6,
      projection: 'globe',
      attributionControl: false
    });

    map.addControl(new mapboxgl.AttributionControl({ compact: true }));
    map.scrollZoom.enable();
    map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');

    map.on('style.load', () => {
      map.setFog({
        color: 'rgb(220, 235, 255)',
        'high-color': 'rgb(180, 210, 245)',
        'horizon-blend': 0.04,
        'space-color': 'rgb(200, 220, 255)',
        'star-intensity': 0.15
      });
    });

    map.on('load', () => {
      missionaries.forEach((m, i) => {
        const popup = new mapboxgl.Popup({
          offset: 25,
          closeButton: true,
          maxWidth: '230px'
        }).setHTML(`
          <div class="popup-inner">
            <div class="popup-photo">Photo coming soon</div>
            <div class="popup-text">
              <div class="popup-name">${m.name}</div>
              <div class="popup-location">📍 ${m.location}</div>
              <div class="popup-ministry">${m.ministry}</div>
            </div>
          </div>
        `);

        new mapboxgl.Marker({ color: '#f07030' })
          .setLngLat([m.lng, m.lat])
          .setPopup(popup)
          .addTo(map);
      });
    });
  </script>
</body>
</html>
