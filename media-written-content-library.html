<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devotionals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      padding: 1.5rem;
    }

    /* ── Archive ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem 1.25rem;
    }

    .devo-card {
      cursor: pointer;
      background: none;
      border: none;
    }
    .devo-card:hover .card-thumb-wrap img,
    .devo-card:hover .card-thumb-placeholder {
      opacity: 0.88;
    }

    .card-thumb-wrap {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 10px;
      overflow: hidden;
      background: #e8e8e8;
      margin-bottom: 0.75rem;
      position: relative;
    }
    .card-thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.15s;
    }

    /* Placeholder thumbnail styled like the media library */
    .card-thumb-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #1a3a6e 0%, #2a5aae 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    .placeholder-cross {
      width: 40px; height: 40px;
      position: relative;
      opacity: 0.5;
    }
    .placeholder-cross::before,
    .placeholder-cross::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 2px;
    }
    .placeholder-cross::before { width: 4px; height: 100%; left: 50%; transform: translateX(-50%); }
    .placeholder-cross::after  { width: 100%; height: 4px; top: 50%; transform: translateY(-50%); }

    @keyframes cardFadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.95); }
    }
    @keyframes cardFadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .devo-card {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .devo-card.hiding {
      animation: cardFadeOut 0.2s ease forwards;
      pointer-events: none;
    }
    .devo-card.showing {
      animation: cardFadeIn 0.2s ease forwards;
    }
    .devo-card.hidden {
      display: none;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      line-height: 1.3;
      margin-bottom: 0.3rem;
    }

    .card-meta {
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta .dot {
      width: 4px; height: 4px;
      background: #bbb;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Reader ── */
    #reader-view {
      display: none;
      max-width: 680px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #3a9da8;
      cursor: pointer;
      margin-bottom: 1.75rem;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .back-btn:hover { text-decoration: underline; }

    .reader-thumb {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 1.75rem;
      display: block;
    }

    .reader-scripture {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3a9da8;
      margin-bottom: 0.5rem;
    }

    .reader-title {
      font-size: 30px;
      font-weight: 700;
      color: #111;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .reader-meta {
      font-size: 13.5px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #eee;
    }
    .reader-meta .dot {
      width: 4px; height: 4px;
      background: #bbb;
      border-radius: 50%;
    }

    .reader-body {
      font-size: 16px;
      color: #333;
      line-height: 1.9;
    }
    .reader-body p { margin-bottom: 1.25rem; }
    .reader-body blockquote {
      border-left: 3px solid #3a9da8;
      padding-left: 1.25rem;
      color: #555;
      font-style: italic;
      margin: 1.5rem 0;
    }

    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .reader-title { font-size: 24px; }
    }
    @media (max-width: 380px) {
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ARCHIVE VIEW -->
<div id="archive-view">
  <div style="position:relative;margin-bottom:1.75rem;">
    <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="rgc-search" type="text" placeholder="Search devotionals..." oninput="filterCards(this.value)" autocomplete="off"
      style="display:block;width:100%;padding:11px 16px 11px 42px;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;border:1px solid #e0e0e0;border-radius:8px;outline:none;color:#333;background:#fafafa;box-shadow:none;appearance:none;-webkit-appearance:none;margin:0;line-height:normal;box-sizing:border-box;"
      onfocus="this.style.borderColor='#3a9da8';this.style.boxShadow='0 0 0 3px rgba(58,157,168,0.12)';this.style.background='#fff';"
      onblur="this.style.borderColor='#e0e0e0';this.style.boxShadow='none';this.style.background='#fafafa';"
    />
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div id="no-results" style="display:none;text-align:center;color:#aaa;font-size:14px;padding:2rem 0;">No devotionals found.</div>
</div>

<!-- READER VIEW -->
<div id="reader-view">
  <button class="back-btn" onclick="showArchive()">&#8592; Devotionals</button>
  <img id="reader-img" class="reader-thumb" src="" alt="" style="display:none;" />
  <div class="reader-scripture" id="reader-scripture"></div>
  <h1 class="reader-title" id="reader-title"></h1>
  <div class="reader-meta" id="reader-meta"></div>
  <div class="reader-body" id="reader-body"></div>
</div>

<script>
// ============================================================
// DEVOTIONALS DATA — add new entries at the TOP (newest first)
// Fields:
//   title      — string
//   date       — string (e.g. "June 7, 2026")
//   author     — string
//   scripture  — string (e.g. "Acts 1:8")
//   image      — optional URL string
//   body       — HTML string, use <p> and <blockquote>
// ============================================================
const devotionals = [
  {
    title: "To the Ends of the Earth",
    date: "June 1, 2026",
    author: "Daniel Wen",
    scripture: "Acts 1:8",
    body: `
      <p>Before Jesus ascended, He gave His disciples a staggering promise: <em>"You will be my witnesses in Jerusalem and in all Judea and Samaria, and to the end of the earth."</em> Notice He did not say "try" or "maybe." He said <em>you will</em>.</p>
      <blockquote>"You will receive power when the Holy Spirit has come upon you, and you will be my witnesses..." — Acts 1:8</blockquote>
      <p>The mission of the church is not optional, and it is not ours alone to carry. The Spirit goes before us. The question is not whether God's purposes will advance — they will. The question is whether we will be part of it.</p>
      <p>Today, take a moment to pray for one missionary by name. Ask God how He might use your ordinary life to serve His extraordinary mission.</p>
    `
  },
  {
    title: "Praying Without Borders",
    date: "May 25, 2026",
    author: "Daniel Wen",
    scripture: "Romans 15:20-21",
    body: `
      <p>Paul writes that his ambition was to preach the gospel "not where Christ has already been named, lest I build on someone else's foundation." He was driven to the frontier, to the places where no one had yet heard.</p>
      <blockquote>"Those who have never been told of him will see, and those who have never heard will understand." — Romans 15:21</blockquote>
      <p>Most of us will never move to an unreached people group. But every single believer has been given the same weapon Paul carried everywhere: prayer. When we pray for a missionary in Madagascar, we are not spectators — we are participants in the same mission.</p>
      <p>Who are you praying for this week? If you are not yet on our Missions Matters prayer list, consider signing up and joining the whole church in lifting up our missionaries by name.</p>
    `
  },
  {
    title: "What Does It Cost?",
    date: "May 18, 2026",
    author: "Daniel Wen",
    scripture: "Luke 14:28",
    body: `
      <p>Jesus sat down and told a crowd of thousands: "Which of you, desiring to build a tower, does not first sit down and count the cost?" It is a strange thing to say in the middle of a call to follow Him. But Jesus was not discouraging them — He was being honest with them.</p>
      <blockquote>"For which of you, desiring to build a tower, does not first sit down and count the cost, whether he has enough to complete it?" — Luke 14:28</blockquote>
      <p>Shallow discipleship crumbles under pressure. Real following begins with eyes wide open. We give up comfort, control, and self-direction — and we gain something infinitely greater: a life that actually means something.</p>
      <p>What has following Jesus cost you? What might He be asking you to lay down today?</p>
    `
  }
];

function filterCards(query) {
  const q = query.toLowerCase().trim();
  const cards = document.querySelectorAll('.devo-card');
  let visible = 0;

  cards.forEach((card, i) => {
    const d = devotionals[i];
    const match = !q ||
      d.title.toLowerCase().includes(q) ||
      d.author.toLowerCase().includes(q) ||
      d.scripture.toLowerCase().includes(q) ||
      (d.body && d.body.toLowerCase().includes(q));

    if (match) {
      visible++;
      if (card.classList.contains('hidden')) {
        card.classList.remove('hidden');
        card.classList.add('showing');
        setTimeout(() => card.classList.remove('showing'), 220);
      }
    } else {
      if (!card.classList.contains('hidden')) {
        card.classList.add('hiding');
        setTimeout(() => {
          card.classList.remove('hiding');
          card.classList.add('hidden');
        }, 200);
      }
    }
  });

  setTimeout(() => {
    const stillVisible = [...cards].filter(c => !c.classList.contains('hidden')).length;
    document.getElementById('no-results').style.display = stillVisible === 0 ? 'block' : 'none';
  }, 220);
}

function renderCards() {
  document.getElementById('cards-grid').innerHTML = devotionals.map((d, i) => `
    <div class="devo-card" onclick="showReader(${i})">
      <div class="card-thumb-wrap">
        ${d.image
          ? `<img src="${d.image}" alt="${d.title}" />`
          : `<div class="card-thumb-placeholder"><div class="placeholder-cross"></div></div>`
        }
      </div>
      <div class="card-title">${d.title}</div>
      <div class="card-meta">
        <span>${d.date}</span>
        <span class="dot"></span>
        <span>${d.author}</span>
      </div>
    </div>
  `).join('');
}

function showReader(i) {
  const d = devotionals[i];
  document.getElementById('archive-view').style.display = 'none';
  const rv = document.getElementById('reader-view');
  rv.style.display = 'block';

  const img = document.getElementById('reader-img');
  if (d.image) { img.src = d.image; img.style.display = 'block'; }
  else { img.style.display = 'none'; }

  document.getElementById('reader-scripture').textContent = d.scripture;
  document.getElementById('reader-title').textContent = d.title;
  document.getElementById('reader-meta').innerHTML =
    `<span>${d.date}</span><span class="dot"></span><span>${d.author}</span>`;
  document.getElementById('reader-body').innerHTML = d.body;
  window.scrollTo(0, 0);
}

function showArchive() {
  document.getElementById('reader-view').style.display = 'none';
  document.getElementById('archive-view').style.display = 'block';
  window.scrollTo(0, 0);
}

renderCards();

// JS-based hover to bypass any Subsplash CSS interference
document.querySelectorAll('.devo-card').forEach(card => {
  const thumb = card.querySelector('.card-thumb-wrap');
  card.addEventListener('mouseenter', () => {
    thumb.style.transform = 'translateY(-6px)';
    thumb.style.boxShadow = '0 12px 28px rgba(0,0,0,0.16)';
  });
  card.addEventListener('mouseleave', () => {
    thumb.style.transform = 'translateY(0px)';
    thumb.style.boxShadow = '0 2px 10px rgba(0,0,0,0.08)';
  });
});
</script>
</body>
</html>
